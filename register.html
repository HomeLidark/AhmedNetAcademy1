<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل حساب جديد - أكاديمية أحمد الحداد</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1a0a2a 50%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-wrapper {
            width: 100%;
            max-width: 500px;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 35px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
        }
        .register-card:hover {
            border-color: rgba(255, 193, 7, 0.3);
        }

        .register-logo { text-align: center; margin-bottom: 30px; }
        .register-logo .icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffc107, #f59e0b);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #0f172a;
            margin-bottom: 15px;
            box-shadow: 0 10px 40px rgba(255, 193, 7, 0.3);
        }
        .register-logo h3 { color: white; font-weight: 700; }
        .register-logo h3 span { color: #ffc107; }
        .register-logo p { color: rgba(255, 255, 255, 0.5); font-size: 0.9rem; }

        .form-group { position: relative; margin-bottom: 20px; }
        .form-group .input-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        .form-group .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 14px 45px 14px 20px;
            color: white;
            transition: all 0.3s ease;
            height: 55px;
        }
        .form-group .form-control:focus {
            border-color: #ffc107;
            box-shadow: 0 0 0 4px rgba(255, 193, 7, 0.1);
            background: rgba(255, 255, 255, 0.08);
        }
        .form-group .form-control::placeholder { color: rgba(255, 255, 255, 0.3); }
        .form-group .form-control:focus+.input-icon { color: #ffc107; }

        .toggle-password {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            padding: 5px;
        }
        .toggle-password:hover { color: #ffc107; }

        .btn-register {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #ffc107, #f59e0b);
            color: #0f172a;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(255, 193, 7, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }
        .divider::before { margin-left: 15px; }
        .divider::after { margin-right: 15px; }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
        }
        .login-link a {
            color: #ffc107;
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover { text-decoration: underline; }

        .password-strength {
            height: 4px;
            border-radius: 4px;
            margin-top: 8px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .password-strength .strength-bar {
            height: 100%;
            border-radius: 4px;
            transition: all 0.3s ease;
            width: 0%;
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            padding: 15px 30px;
            border-radius: 15px;
            background: rgba(34, 197, 94, 0.95);
            color: white;
            font-weight: 600;
            backdrop-filter: blur(10px);
            z-index: 9999;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .notification.show { transform: translateX(-50%) translateY(0); }
        .notification.error { background: rgba(220, 53, 69, 0.95); }

        @media (max-width: 576px) {
            .register-card { padding: 30px 20px; }
            .register-logo .icon { width: 60px; height: 60px; font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- ===== NOTIFICATION ===== -->
    <div class="notification" id="notification">
        <i class="fas fa-check-circle me-2"></i>
        <span id="notificationMessage">تم إنشاء الحساب بنجاح!</span>
    </div>

    <!-- ===== REGISTER WRAPPER ===== -->
    <div class="register-wrapper">
        <div class="register-card" data-aos="fade-up" data-aos-duration="1000">

            <div class="register-logo">
                <div class="icon"><i class="fas fa-user-plus"></i></div>
                <h3>أكاديمية <span>أحمد الحداد</span></h3>
                <p>أنشئ حسابك الجديد</p>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <input type="text" class="form-control" id="fullName" placeholder="الاسم الكامل" required />
                    <i class="fas fa-user input-icon"></i>
                </div>

                <div class="form-group">
                    <input type="email" class="form-control" id="emailInput" placeholder="البريد الإلكتروني" required />
                    <i class="fas fa-envelope input-icon"></i>
                </div>

                <div class="form-group">
                    <input type="password" class="form-control" id="passwordInput" placeholder="كلمة المرور" required onkeyup="checkPasswordStrength()" />
                    <i class="fas fa-lock input-icon"></i>
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i class="fas fa-eye" id="passwordToggleIcon"></i>
                    </button>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <small class="text-muted" id="strengthText" style="font-size:0.7rem;">ضع كلمة مرور قوية</small>
                </div>

                <div class="form-group">
                    <input type="password" class="form-control" id="confirmPassword" placeholder="تأكيد كلمة المرور" required />
                    <i class="fas fa-check-circle input-icon"></i>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="termsCheck" required />
                    <label class="form-check-label text-white-50" for="termsCheck">
                        أوافق على <a href="#" class="text-warning">الشروط والأحكام</a>
                    </label>
                </div>

                <button type="submit" class="btn-register">
                    <i class="fas fa-user-plus me-2"></i>إنشاء الحساب
                </button>
            </form>

            <div class="divider">أو</div>

            <div class="social-buttons d-flex gap-2">
                <a href="#" class="btn-register" style="background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.6);font-size:0.9rem;">
                    <i class="fab fa-google"></i> Google
                </a>
                <a href="#" class="btn-register" style="background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.6);font-size:0.9rem;">
                    <i class="fab fa-github"></i> GitHub
                </a>
            </div>

            <div class="login-link">
                لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js">
    </script>
    <script>
        AOS.init({ duration: 800, once: true, easing: 'ease-in-out' });

        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('passwordToggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function checkPasswordStrength() {
            const password = document.getElementById('passwordInput').value;
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');

            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;

            const colors = ['#dc3545', '#f59e0b', '#0dcaf0', '#20c997', '#ffc107'];
            const labels = ['ضعيفة جداً', 'ضعيفة', 'متوسطة', 'قوية', 'قوية جداً'];

            bar.style.width = (strength / 5 * 100) + '%';
            bar.style.background = colors[strength - 1] || '#dc3545';
            text.textContent = labels[strength - 1] || 'ضع كلمة مرور قوية';
            text.style.color = colors[strength - 1] || '#94a3b8';
        }

        function showNotification(message, type = 'success') {
            const notif = document.getElementById('notification');
            document.getElementById('notificationMessage').textContent = message;
            notif.className = 'notification';
            if (type === 'error') notif.classList.add('error');
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const confirm = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('termsCheck').checked;

            if (!name || !email || !password || !confirm) {
                showNotification('❌ الرجاء ملء جميع الحقول', 'error');
                return;
            }

            if (password !== confirm) {
                showNotification('❌ كلمات المرور غير متطابقة', 'error');
                return;
            }

            if (!terms) {
                showNotification('❌ يجب الموافقة على الشروط والأحكام', 'error');
                return;
            }

            if (password.length < 8) {
                showNotification('❌ كلمة المرور يجب أن تكون 8 أحرف على الأقل', 'error');
                return;
            }

            showNotification('✅ تم إنشاء الحساب بنجاح! مرحباً بك في الأكاديمية');
            setTimeout(() => window.location.href = 'login.html', 2500);
        }
    </script>
</body>
</html>
